name: Build & Deploy Dash (Render)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    name: Test build (CI)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
            python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # (Opcional) Rode testes/linters aqui, se tiver
      # - name: Run tests
      #   run: pytest -q

      - name: Sanity check - Gunicorn entrypoint
        run: |
          python -c "import main; assert hasattr(main, 'server'), 'main.py deve expor server = app.server'"

  deploy:
    name: Trigger Render deploy
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Call Render Deploy Hook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
