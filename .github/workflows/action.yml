name: Web Build + Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]          # deploy only on push to main
  pull_request:
    branches: [ "main" ]          # build on PRs to main (no deploy)
  workflow_dispatch:               # manual run

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  UV_PYTHON: "3.12"                 # Python version for uv
  # https://docs.flet.dev/reference/environment-variables
  FLET_CLI_NO_RICH_OUTPUT: "1"

jobs:
  build:
    name: Build web app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      # If your project has a pyproject.toml with flet as a dependency,
      # uv will handle it automatically in 'uv run'. If not, uncomment the next step:
      # - name: Install flet (no pyproject)
      #   run: uv pip install --system flet flet-cli

      - name: Build app
        shell: bash
        run: |
          set -euo pipefail
          REPO_NAME="REPO_NAME_HERE"
          uv run flet build web \
            --yes \
            --verbose \
            --base-url "/${REPO_NAME}" \
            --route-url-strategy hash

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/web
          name: web-build-artifact
          retention-days: 20

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'  # deploy only on push to main
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: web-build-artifact
